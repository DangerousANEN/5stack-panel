name: "2. Jules Autonomous Loop"

on:
  pull_request:
    types:
      - closed

  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

jobs:
  next-task:
    runs-on: ubuntu-latest

    if: github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (github.event.pull_request.merged == true &&
         (github.event.pull_request.user.login == 'google-jules[bot]' ||
          contains(github.event.pull_request.labels.*.name, 'jules')))

    steps:
      - name: Trigger Jules
        env:
          PROMPT: |
            You are the autonomous maintainer of the 5Stack ecosystem.

            Repositories:
            - 5stack-panel
            - web
            - api
            - game-streamer
            - game-server

            Goal: continuously improve CS2 tournament platform.

            Loop:
            1. analyze repo
            2. detect issues
            3. pick highest value task
            4. implement fully
            5. add tests
            6. update docs
            7. create ONE PR

            Rules:
            - do not modify secrets
            - keep changes scoped
            - prefer small improvements

        run: |
          curl -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg source "sources/github/${{ github.repository }}" \
              '{
                prompt: $prompt,
                sourceContext: {
                  source: $source,
                  githubRepoContext: {
                    startingBranch: "main"
                  }
                },
                automationMode: "AUTO_CREATE_PR",
                title: "Autonomous Improvement"
              }')"
